<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Smart Education System</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family: Arial, sans-serif;
            background:#f0f4ff;
        }

        .container{
            width:90%;
            margin:auto;
            padding:20px;
        }

        h1{
            text-align:center;
            color:#001f8f;
            margin-bottom:30px;
        }

        .form-box{
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 4px 10px rgba(0,0,0,0.1);
            width:400px;
            margin:auto;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:15px;
            border-radius:8px;
            border:1px solid #ccc;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            background:#001f8f;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#0033cc;
        }

        .records{
            margin-top:40px;
        }

        .student-card{
            background:white;
            padding:20px;
            margin-top:15px;
            border-radius:12px;
            box-shadow:0px 3px 8px rgba(0,0,0,0.1);
        }

        .student-card h3{
            color:#001f8f;
        }

        .report-link{
            text-decoration:none;
            color:green;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Smart Education System Analysis</h1>

    <div class="form-box">

        <form method="POST"
              enctype="multipart/form-data">

            {% csrf_token %}

            <input type="text"
                   name="name"
                   placeholder="Enter Student Name"
                   required>

            <input type="number"
                   name="attendance"
                   placeholder="Attendance %"
                   min="0"
                   max="100"
                   required>

            <input type="number"
                   name="marks"
                   placeholder="Marks"
                   min="0"
                   max="100"
                   required>

            <input type="file"
                   name="report">

            <button type="submit">
                Add Student
            </button>

        </form>

    </div>

    <div class="records">

        <h2>Student Records</h2>

        {% for student in students %}

        <div class="student-card">

            <h3>{{ student.name }}</h3>

            <p>
                Attendance:
                <strong>{{ student.attendance }}%</strong>
            </p>

            <p>
                Marks:
                <strong>{{ student.marks }}</strong>
            </p>

            {% if student.report %}

            <a class="report-link"
               href="{{ student.report.url }}">

               View Report

            </a>

            {% endif %}

        </div>

        {% endfor %}

    </div>

</div>

</body>

</html>
