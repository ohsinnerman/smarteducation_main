{% extends 'base.html' %}

{% block title %}Delete Student{% endblock %}
{% block page_title %}Delete Student{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="stat-card text-center">
            <i class="bi bi-exclamation-triangle text-danger fs-1"></i>
            <h4 class="mt-3">Delete {{ student.name }}?</h4>
            <p class="text-muted">This action cannot be undone. All associated data will be lost.</p>
            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i>Confirm Delete</button>
                <a href="{% url 'student_list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
