{% extends 'base.html' %}
{% block title %}Add Course{% endblock %}
{% block page_title %}Add Course{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-8">
    <div class="stat-card">
        <h5 class="fw-bold mb-4"><i class="bi bi-book me-2"></i>Add Course</h5>
        <form method="POST">{% csrf_token %}
            <div class="row">
                <div class="col-md-6 mb-3"><label class="form-label">Course Name *</label><input type="text" name="name" class="form-control" required></div>
                <div class="col-md-3 mb-3"><label class="form-label">Code *</label><input type="text" name="code" class="form-control" required></div>
                <div class="col-md-3 mb-3"><label class="form-label">Credit Hours</label><input type="number" name="credit_hours" class="form-control" value="3"></div>
                <div class="col-12 mb-3"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="3"></textarea></div>
            </div>
            <button type="submit" class="btn btn-primary" style="background: var(--primary); border: none;"><i class="bi bi-check-lg me-1"></i>Create</button>
            <a href="{% url 'course_list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
        </form>
    </div>
</div></div>
{% endblock %}
