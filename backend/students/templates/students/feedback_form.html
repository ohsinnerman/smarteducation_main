{% extends 'base.html' %}
{% block title %}Add Feedback{% endblock %}
{% block page_title %}Add Feedback{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-8">
    <div class="stat-card">
        <h5 class="fw-bold mb-4"><i class="bi bi-star me-2"></i>Add Feedback</h5>
        <form method="POST">{% csrf_token %}
            <div class="row">
                <div class="col-md-4 mb-3"><label class="form-label">Student *</label><select name="student" class="form-select" required><option value="">Select</option>{% for s in students %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}</select></div>
                <div class="col-md-4 mb-3"><label class="form-label">Teacher *</label><select name="teacher" class="form-select" required><option value="">Select</option>{% for t in teachers %}<option value="{{ t.id }}">{{ t.username }}</option>{% endfor %}</select></div>
                <div class="col-md-4 mb-3"><label class="form-label">Rating *</label><select name="rating" class="form-select" required><option value="5">5 - Excellent</option><option value="4">4 - Good</option><option value="3">3 - Average</option><option value="2">2 - Below Average</option><option value="1">1 - Poor</option></select></div>
                <div class="col-12 mb-3"><label class="form-label">Comment</label><textarea name="comment" class="form-control" rows="3"></textarea></div>
            </div>
            <button type="submit" class="btn btn-primary" style="background: var(--primary); border: none;"><i class="bi bi-check-lg me-1"></i>Submit</button>
            <a href="{% url 'feedback_list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
        </form>
    </div>
</div></div>
{% endblock %}
