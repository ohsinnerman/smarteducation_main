{% extends 'base.html' %}
{% block title %}Add Result{% endblock %}
{% block page_title %}Add Result{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-8">
    <div class="stat-card">
        <h5 class="fw-bold mb-4"><i class="bi bi-graph-up me-2"></i>Add Result</h5>
        <form method="POST">{% csrf_token %}
            <div class="row">
                <div class="col-md-4 mb-3"><label class="form-label">Student *</label><select name="student" class="form-select" required><option value="">Select</option>{% for s in students %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}</select></div>
                <div class="col-md-4 mb-3"><label class="form-label">Exam *</label><select name="exam" class="form-select" required><option value="">Select</option>{% for e in exams %}<option value="{{ e.id }}">{{ e.name }}</option>{% endfor %}</select></div>
                <div class="col-md-4 mb-3"><label class="form-label">Marks *</label><input type="number" name="marks_obtained" class="form-control" step="0.1" required></div>
                <div class="col-12 mb-3"><label class="form-label">Remarks</label><textarea name="remarks" class="form-control" rows="2"></textarea></div>
            </div>
            <button type="submit" class="btn btn-primary" style="background: var(--primary); border: none;"><i class="bi bi-check-lg me-1"></i>Save</button>
            <a href="{% url 'result_list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
        </form>
    </div>
</div></div>
{% endblock %}
