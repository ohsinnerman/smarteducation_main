version: '3.8'

services:
  web:
    build: .
    command: gunicorn --bind 0.0.0.0:8000 --workers 3 smarteducation.wsgi:application
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      # DJANGO_ENV selects dev/prod inside the settings package; no need to pin
      # DJANGO_SETTINGS_MODULE (that previously forced base settings and made
      # DATABASE_URL/REDIS_URL below be ignored).
      - DJANGO_ENV=development
      - DJANGO_DEBUG=1
      - DATABASE_URL=postgres://postgres:postgres@db:5432/smarteducation
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=smarteducation
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery:
    build: .
    command: celery -A smarteducation worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - DJANGO_ENV=development
      - DATABASE_URL=postgres://postgres:postgres@db:5432/smarteducation
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  static_volume:
  media_volume:
