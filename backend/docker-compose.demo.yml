# Minimal demo stack: SQLite + Caddy (auto-HTTPS). No Postgres/Redis/Celery.
# For a throwaway demo on a t3.micro. Data lives in the db.sqlite3 bind-mount.
#   docker compose -f docker-compose.demo.yml up -d --build
#
# Caddy terminates TLS (free Let's Encrypt cert for your DuckDNS host) and
# reverse-proxies to gunicorn, so the frontend gets an HTTPS backend URL.
services:
  web:
    build: .
    command: gunicorn --bind 0.0.0.0:8000 --workers 2 smarteducation.wsgi:application
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    expose:
      - "8000"
    environment:
      - DJANGO_ENV=development
      - DJANGO_DEBUG=1
      - DJANGO_ALLOWED_HOSTS=*
      # Your Vercel origin so the browser's cross-origin call is allowed.
      - CORS_ALLOWED_ORIGINS=https://smarteducation-main.vercel.app,http://localhost:5173
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    restart: unless-stopped

volumes:
  static_volume:
  caddy_data:
  caddy_config:
