name: Deploy to AWS

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        # manage.py and requirements.txt live at the repo ROOT, not in the
        # smarteducation/ package dir. The previous `cd smarteducation` made both
        # of these steps fail.
        run: pip install -r requirements.txt
      - name: Run checks
        run: python manage.py check
      - name: Diagnose environment
        run: python manage.py diagnose_env

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: smarteducation
          IMAGE_TAG: ${{ github.sha }}
        # NOTE (Phase 4, deferred): this job still targets ECS/ECR. The chosen
        # deploy path is direct-EC2 + docker-compose, so this deploy job will be
        # replaced in Phase 4. Build context is the repo root (Dockerfile is here).
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          service: smarteducation-service
          cluster: smarteducation-cluster
          wait-for-service-stability: true
